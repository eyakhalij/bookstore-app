version: "3.8"

services:
  # Flask app
  bookstore-app:
    build: .                      # Build the Dockerfile in the current directory
    ports:
      - "5000:5000"                # Expose port 5000 for Flask
    depends_on:
      - mongodb                    # Ensure MongoDB starts before the app
    environment:
      - MONGO_URI=mongodb://mongodb:27017/  # MongoDB URI used in Flask app
    volumes:
      - .:/app                     # Mount the current directory to /app in the container

  # MongoDB container
  mongodb:
    image: mongo:latest
    container_name: bookstore-mongo
    ports:
      - "27017:27017"               # Expose MongoDB's default port
    volumes:
      - mongodb_data:/data/db      # Persist MongoDB data

# Volumes for persisting MongoDB data
volumes:
  mongodb_data:
    driver: local
