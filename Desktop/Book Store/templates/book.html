<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book['title'] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
        }
        .header {
            background-color: #6f42c1;
            color: white;
            padding: 10px 0;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .book-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        .book-image img {
            max-width: 300px;
            height: auto;
            margin-bottom: 20px;
        }
        .book-details {
            text-align: center;
        }
        .book-details h3 {
            font-size: 22px;
            margin: 10px 0;
        }
        .book-details p {
            font-size: 18px;
            margin: 5px 0;
        }
        .btn-custom {
            background-color: #6f42c1;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
        }
        .btn-custom:hover {
            background-color: #582c9c;
            color: white;
        }
        footer {
            background-color: #6f42c1;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">Book Store</div>
    <div class="book-container">
        <h2>{{ book['title'] }}</h2>
        <div class="book-image">
            <img src="{{ book['image'] }}" alt="{{ book['title'] }}">
        </div>
        <div class="book-details">
            <h3>Author: {{ book['author'] }}</h3>
            <p>Price: ${{ book['price'] }}</p>
            <p>{{ book['description'] }}</p>
        </div>
        <a href="/db" class="btn btn-custom">Back to List</a>
    </div>
    <footer>
        © 2024 Book Store
    </footer>
</body>
</html>
