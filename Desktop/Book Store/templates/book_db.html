<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book['title'] }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        main {
            flex: 1;
        }
        .header {
            background-color: #6f42c1;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        .footer {
            background-color: #6f42c1;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        .book-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px auto;
            width: 50%;
            background: white;
            padding: 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .book-image img {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
        }
        .book-details {
            text-align: center;
        }
        .btn-custom {
            background-color: #6f42c1;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
        }
        .btn-custom:hover {
            background-color: #582c9c;
            color: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Book Details</h1>
    </header>
    <main>
        <div class="book-container">
            <div class="book-image">
                <img src="{{ book['image'] }}" alt="{{ book['title'] }}">
            </div>
            <div class="book-details">
                <h2>{{ book['title'] }}</h2>
                <h4>Author: <strong>{{ book['author'] }}</strong></h4>
                <p>Price: <strong>${{ book['price'] }}</strong></p>
                <p>{{ book['description'] }}</p>
            </div>
            <a href="/" class="btn btn-custom">Back to Home</a>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2024 Book Store</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
