<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header, .footer {
            background-color: #6f42c1;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        .carousel-inner img {
            object-fit: cover;
            height: 400px;
        }
        .book-image {
            display: block;
            margin: 0 auto;
            max-width: 200px;
        }
        .btn-custom {
            background-color: #6f42c1;
            color: white;
            border: none;
        }
        .btn-custom:hover {
            background-color: #582c9c;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Book Store</h1>
    </header>

    <!-- Carousel Section -->
    <div id="bookCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            {% for book in books %}
            <div class="carousel-item {% if loop.first %}active{% endif %}">
                <img src="{{ book['image'] }}" class="d-block w-100" alt="{{ book['title'] }}">
                <div class="carousel-caption d-none d-md-block">
                    <h5>{{ book['title'] }}</h5>
                    <p>{{ book['author'] }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#bookCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#bookCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Book Collection Section -->
    <main class="container mt-5">
        <div class="d-flex justify-content-between mb-4">
            <h2>Our Collection</h2>
            <a href="/db/add" class="btn btn-custom">Add New Book</a>
        </div>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for book in books %}
            <div class="col">
                <div class="card h-100">
                    <img src="{{ book['image'] }}" class="card-img-top book-image" alt="{{ book['title'] }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ book['title'] }}</h5>
                        <p class="card-text">by {{ book['author'] }}</p>
                        <p class="text-success fw-bold">${{ book['price'] }}</p>
                        <div class="d-flex justify-content-around">
                            <a href="/db/book/{{ book['_id'] }}" class="btn btn-primary">View Details</a>
                            <a href="/db/edit/{{ book['_id'] }}" class="btn btn-warning">Edit</a>
                            <form method="POST" action="/db/delete/{{ book['_id'] }}" style="display:inline;">
                                <button type="submit" class="btn btn-danger">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Book Store</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
