<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store - JSON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header -->
    <header class="bg-purple text-white text-center py-3">
        <h1>Book Store</h1>
    </header>

    <!-- Carousel -->
    <div id="bookCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
        <div class="carousel-inner">
            {% for book in books %}
            <div class="carousel-item {% if loop.first %}active{% endif %}">
                <img src="{{ book['image'] }}" class="d-block w-100" alt="{{ book['title'] }}" style="height: 400px; object-fit: cover;">
                <div class="carousel-caption d-none d-md-block">
                    <h5>{{ book['title'] }}</h5>
                    <p>{{ book['author'] }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#bookCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#bookCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Book Collection -->
    <main class="container mt-5">
        <h2 class="text-center mb-4">Our Collection</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for book in books %}
            <div class="col">
                <div class="card h-100 shadow">
                    <img src="{{ book['image'] }}" class="card-img-top" alt="{{ book['title'] }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ book['title'] }}</h5>
                        <p class="card-text text-muted">{{ book['author'] }}</p>
                        <p class="text-success fw-bold">${{ book['price'] }}</p>
                        <a href="/book/{{ book['id'] }}" class="btn btn-primary">View Details</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-purple text-white text-center py-3 mt-5">
        <p>&copy; 2024 Book Store. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
