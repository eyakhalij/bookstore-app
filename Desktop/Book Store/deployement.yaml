apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstore
  template:
    metadata:
      labels:
        app: bookstore
    spec:
      containers:
      - name: bookstore
        image: eyakhalij/bookstore:latest
        ports:
        - containerPort: 5000
      imagePullSecrets:
      - name: regcred
